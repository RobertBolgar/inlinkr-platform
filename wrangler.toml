name = "tubelinkr"
compatibility_date = "2024-04-07"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "tubelinkr-db"
database_id = "7fd2cd09-fafa-496f-8310-a7e86ca5c03c"

[[rate_limits]]
binding = "RATE_LIMITER"

# Enable diagnostics on pro-dev for debugging attribution issues
vars = { ENABLE_DIAGNOSTICS = "true" }

[env.production]
# Temporary development phase: app.inlinkr.com is the InLinkr development environment,
# even though Cloudflare still labels this environment as Production.
vars = { ENVIRONMENT = "production", VITE_CLERK_PUBLISHABLE_KEY = "pk_test_bWF0dXJlLXRlcm1pdGUtMzQuY2xlcmsuYWNjb3VudHMuZGV2JA" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "tubelinkr-db"
database_id = "7fd2cd09-fafa-496f-8310-a7e86ca5c03c"

[env.preview]
vars = { ENVIRONMENT = "preview", VITE_CLERK_PUBLISHABLE_KEY = "pk_test_bWF0dXJlLXRlcm1pdGUtMzQuY2xlcmsuYWNjb3VudHMuZGV2JA" }

[[env.preview.d1_databases]]
binding = "DB"
database_name = "tubelinkr-db"
database_id = "7fd2cd09-fafa-496f-8310-a7e86ca5c03c"
