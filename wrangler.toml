name = "tubelinkr"
compatibility_date = "2024-04-07"
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "tubelinkr-db"
database_id = "7fd2cd09-fafa-496f-8310-a7e86ca5c03c"

[[rate_limits]]
binding = "RATE_LIMITER"

# Enable diagnostics on pro-dev for debugging attribution issues
vars = { ENABLE_DIAGNOSTICS = "true" }

[env.production]
# Temporary development phase: app.inlinkr.com is the InLinkr development environment,
# even though Cloudflare still labels this environment as Production.
vars = { 
  ENVIRONMENT = "production", 
  VITE_CLERK_PUBLISHABLE_KEY = "pk_test_bWF0dXJlLXRlcm1pdGUtMzQuY2xlcmsuYWNjb3VudHMuZGV2JA",
  VITE_CLERK_SIGN_IN_URL = "/login",
  VITE_CLERK_SIGN_UP_URL = "/signup",
  VITE_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/dashboard",
  VITE_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/dashboard",
  VITE_REDIRECT_BASE_URL = "https://go-dev.inlinkr.com",
  VITE_APP_BASE_URL = "https://app.inlinkr.com",
  VITE_MARKETING_BASE_URL = "https://inlinkr.com",
  VITE_STRIPE_ENABLED = "false",
  VITE_EMAIL_ENABLED = "false",
  VITE_ENABLE_CUSTOM_SUBDOMAINS = "false",
  REDIRECT_BASE_URL = "https://go-dev.inlinkr.com",
  APP_BASE_URL = "https://app.inlinkr.com",
  MARKETING_BASE_URL = "https://inlinkr.com",
  EMAIL_ENABLED = "false",
  EMAIL_FROM_NAME = "InLinkr",
  EMAIL_FROM_ADDRESS = "notify@inlinkr.com",
  STRIPE_ENABLED = "false"
}

[[env.production.d1_databases]]
binding = "DB"
database_name = "tubelinkr-db"
database_id = "7fd2cd09-fafa-496f-8310-a7e86ca5c03c"

