# InLinkr Production Redirect Worker Configuration
# This configuration deploys the production redirect Worker to inlinkr-go
# Target domains: go.inlinkr.com, *.inlinkr.com
# D1 database: tubelinkr-prod-db (production)

name = "inlinkr-go"
main = "worker.js"
compatibility_date = "2024-04-07"

# Routes for InLinkr production redirect domains
routes = [
  "go.inlinkr.com/*",
  "*.inlinkr.com/*"
]

# D1 database binding - production
[[d1_databases]]
binding = "DB"
database_name = "tubelinkr-prod-db"
database_id = "97ea0d89-0e4f-449a-8ad9-1e8c7c2b689c"

# Environment variables for Pages origins
[vars]
INLINKR_APP_ORIGIN = "https://inlinkr-platform.pages.dev"
INLINKR_MARKETING_ORIGIN = "https://inlinkr-home.pages.dev"
